version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: bundesliga_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bundesliga}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bundesliga_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bundesliga"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bundesliga_network
    restart: unless-stopped

  # Redis Cache & Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: bundesliga_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bundesliga_network
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bundesliga_backend
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-bundesliga}:${POSTGRES_PASSWORD}@postgres:5432/bundesliga_db
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-}
      POLLING_INTERVAL: 30
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - bundesliga_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Expo Mobile Server (optional)
  mobile:
    image: node:20-alpine
    container_name: bundesliga_mobile
    working_dir: /app
    command: npm start
    ports:
      - "19000:19000"
      - "19001:19001"
    volumes:
      - ./mobile:/app
    networks:
      - bundesliga_network
    restart: unless-stopped
    profiles:
      - mobile

networks:
  bundesliga_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
