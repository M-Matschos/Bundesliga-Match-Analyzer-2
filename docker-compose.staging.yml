version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: matchoracle_postgres_staging
    environment:
      POSTGRES_DB: matchoracle_staging
      POSTGRES_USER: matchoracle
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stagingpassword123}
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matchoracle -d matchoracle_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - matchoracle_staging

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: matchoracle_redis_staging
    command: redis-server --appendonly yes
    volumes:
      - redis_data_staging:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - matchoracle_staging

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matchoracle_backend_staging
    environment:
      ENVIRONMENT: staging
      DEBUG: "False"
      LOG_LEVEL: INFO

      # Database
      DATABASE_URL: postgresql+asyncpg://matchoracle:${DB_PASSWORD:-stagingpassword123}@postgres:5432/matchoracle_staging
      DB_POOL_SIZE: 20
      DB_ECHO: "False"

      # Redis
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL_DEFAULT: 3600
      CACHE_TTL_PREDICTIONS: 86400

      # Security
      JWT_SECRET: ${JWT_SECRET:-staging_secret_key_change_in_production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 10080
      BCRYPT_ROUNDS: 12

      # API Keys (Staging)
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-demo}
      FOOTBALL_DATA_KEY: ${FOOTBALL_DATA_KEY:-demo}
      ODDS_API_KEY: ${ODDS_API_KEY:-demo}
      OPENWEATHER_KEY: ${OPENWEATHER_KEY:-demo}

      # Celery
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1

      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_FORMAT: json
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173,http://localhost:19000"

      # Rate Limiting
      RATE_LIMIT_ENABLED: "True"
      RATE_LIMIT_REQUESTS: 1000
      RATE_LIMIT_WINDOW_SECONDS: 60

      # ML Settings
      ML_MODEL_DIR: /models/trained
      ML_SIMULATION_SAMPLES: 10000
      ML_BACKTEST_WINDOW_YEARS: 5

    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/database:/app/database
      - ./backend/scripts:/app/scripts
      - ml_models_staging:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/metrics/health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - matchoracle_staging

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matchoracle_celery_staging
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    environment:
      ENVIRONMENT: staging
      DATABASE_URL: postgresql+asyncpg://matchoracle:${DB_PASSWORD:-stagingpassword123}@postgres:5432/matchoracle_staging
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:-demo}
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - ./backend/app:/app/app
      - ./backend/database:/app/database
      - ml_models_staging:/models
    networks:
      - matchoracle_staging

  # Celery Beat Scheduler
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matchoracle_celery_beat_staging
    command: celery -A app.core.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      ENVIRONMENT: staging
      DATABASE_URL: postgresql+asyncpg://matchoracle:${DB_PASSWORD:-stagingpassword123}@postgres:5432/matchoracle_staging
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - ./backend/app:/app/app
    networks:
      - matchoracle_staging

networks:
  matchoracle_staging:
    driver: bridge

volumes:
  postgres_data_staging:
  redis_data_staging:
  ml_models_staging:
